<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Quick Sermon — Redesign</title>
  <style>
    html, body { margin: 0; padding: 0; background: #f0eee9; overflow: hidden; height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Tokens + primitives -->
  <script type="text/babel" src="components/tokens.jsx"></script>
  <!-- Shell -->
  <script type="text/babel" src="components/shell.jsx"></script>
  <!-- Design canvas -->
  <script type="text/babel" src="components/design-canvas.jsx"></script>

  <!-- Screens -->
  <script type="text/babel" src="components/screens-auth.jsx"></script>
  <script type="text/babel" src="components/screens-dashboard.jsx"></script>
  <script type="text/babel" src="components/screens-videos.jsx"></script>
  <script type="text/babel" src="components/screens-clips.jsx"></script>
  <script type="text/babel" src="components/screens-editor.jsx"></script>
  <script type="text/babel" src="components/screens-pipeline.jsx"></script>
  <script type="text/babel" src="components/screens-settings.jsx"></script>
  <script type="text/babel" src="components/screens-forgot.jsx"></script>
  <script type="text/babel" src="components/screens-users.jsx"></script>
  <script type="text/babel" src="components/screens-notifications.jsx"></script>
  <script type="text/babel" src="components/screens-clips-tab.jsx"></script>
  <script type="text/babel" src="components/screens-onboarding.jsx"></script>

  <script type="text/babel" data-presets="react">
    const APP_W = 1200, APP_H = 800;
    const AUTH_W = 520, AUTH_H = 720;
    const ONB_W = 520, ONB_H = 720;

    function Frame({ children, w = APP_W, h = APP_H }) {
      // Artboard inner surface — the actual screen is already w×h, so we just render it.
      return <div style={{ width: w, height: h, overflow: 'hidden' }}>{children}</div>;
    }

    function App() {
      return (
        <DesignCanvas>

          {/* ── 01. Auth ─────────────────────────────────────── */}
          <DCSection id="auth" title="01 · Autenticação"
            subtitle="Entrada unificada com a linguagem da landing — serifa DM Serif Display, glow âmbar e stone-950 como base.">
            <DCArtboard id="login" label="Login" width={AUTH_W} height={AUTH_H}>
              <Frame w={AUTH_W} h={AUTH_H}><LoginScreen /></Frame>
            </DCArtboard>
            <DCArtboard id="register" label="Criar conta" width={AUTH_W} height={AUTH_H}>
              <Frame w={AUTH_W} h={AUTH_H}><RegisterScreen /></Frame>
            </DCArtboard>
            <DCArtboard id="forgot-1" label="Esqueci senha · email" width={AUTH_W} height={AUTH_H}>
              <Frame w={AUTH_W} h={AUTH_H}><ForgotStep1Screen /></Frame>
            </DCArtboard>
            <DCArtboard id="forgot-2" label="Esqueci senha · código" width={AUTH_W} height={AUTH_H}>
              <Frame w={AUTH_W} h={AUTH_H}><ForgotStep2Screen /></Frame>
            </DCArtboard>
            <DCArtboard id="forgot-3" label="Esqueci senha · nova senha" width={AUTH_W} height={AUTH_H}>
              <Frame w={AUTH_W} h={AUTH_H}><ForgotStep3Screen /></Frame>
            </DCArtboard>
          </DCSection>

          {/* ── 01b. Onboarding ─────────────────────────────── */}
          <DCSection id="onboarding" title="01b · Onboarding"
            subtitle="Primeiro uso após criar conta — 4 passos: boas-vindas, conectar canal, preferências da IA e primeira detecção.">
            <DCArtboard id="onb-1" label="1 · Bem-vindo" width={ONB_W} height={ONB_H}>
              <Frame w={ONB_W} h={ONB_H}><OnboardingWelcomeScreen /></Frame>
            </DCArtboard>
            <DCArtboard id="onb-2" label="2 · Conectar YouTube" width={ONB_W} height={ONB_H}>
              <Frame w={ONB_W} h={ONB_H}><OnboardingConnectScreen /></Frame>
            </DCArtboard>
            <DCArtboard id="onb-3" label="3 · Tom da IA" width={ONB_W} height={ONB_H}>
              <Frame w={ONB_W} h={ONB_H}><OnboardingAIScreen /></Frame>
            </DCArtboard>
            <DCArtboard id="onb-4" label="4 · Primeira detecção" width={ONB_W} height={ONB_H}>
              <Frame w={ONB_W} h={ONB_H}><OnboardingFirstDetectionScreen /></Frame>
            </DCArtboard>
          </DCSection>

          {/* ── 02. Dashboard ────────────────────────────────── */}
          <DCSection id="dashboard" title="02 · Dashboard"
            subtitle="Hero com saudação pessoal, métricas com sparkline âmbar, pipeline ao vivo e quota do YouTube.">
            <DCArtboard id="home" label="Home — visão geral" width={APP_W} height={APP_H}>
              <Frame><DashboardScreen /></Frame>
            </DCArtboard>
          </DCSection>

          {/* ── 03. Vídeos ───────────────────────────────────── */}
          <DCSection id="videos" title="03 · Vídeos"
            subtitle="Lista, detalhe e fluxo de criação de clipe. Chips de filtro, status unificado e detecção por IA.">
            <DCArtboard id="list" label="Lista de vídeos" width={APP_W} height={APP_H}>
              <Frame><VideosListScreen /></Frame>
            </DCArtboard>
            <DCArtboard id="detail" label="Detalhe + detecção" width={APP_W} height={APP_H}>
              <Frame><VideoDetailScreen /></Frame>
            </DCArtboard>
            <DCArtboard id="clips-tab" label="Aba clipes · dentro do vídeo" width={APP_W} height={APP_H}>
              <Frame><VideoClipsTabScreen /></Frame>
            </DCArtboard>
            <DCArtboard id="editor" label="Editor de clip — workspace" width={APP_W} height={APP_H}>
              <Frame><ClipEditorScreen /></Frame>
            </DCArtboard>
          </DCSection>

          {/* ── 04. Revisão de clipe (fluxo principal) ───────── */}
          <DCSection id="clip-review" title="04 · Revisão do clipe"
            subtitle="O coração do produto: preview + edição de título, descrição e mensagem de WhatsApp gerados pela IA.">
            <DCArtboard id="review" label="Revisão + publicação" width={APP_W} height={APP_H}>
              <Frame><ClipReviewScreen /></Frame>
            </DCArtboard>
          </DCSection>

          {/* ── 05. Pipeline ─────────────────────────────────── */}
          <DCSection id="pipeline" title="05 · Pipeline"
            subtitle="Jobs ativos com estágios (download · corte · upload), log ao vivo, histórico e tiles de status.">
            <DCArtboard id="jobs" label="Jobs + log ao vivo" width={APP_W} height={APP_H}>
              <Frame><PipelineScreen /></Frame>
            </DCArtboard>
          </DCSection>

          {/* ── 06. Configurações ────────────────────────────── */}
          <DCSection id="settings" title="06 · Configurações"
            subtitle="Perfil, canais conectados, preferências de IA e zona de perigo — navegação lateral com badges.">
            <DCArtboard id="main" label="Perfil + canais + IA" width={APP_W} height={APP_H}>
              <Frame><SettingsScreen /></Frame>
            </DCArtboard>
          </DCSection>

          {/* ── 07. Equipe ────────────────────────────────────── */}
          <DCSection id="users" title="07 · Equipe"
            subtitle="Gestão de membros com papéis (admin/editor/revisor), convites pendentes e assentos do plano.">
            <DCArtboard id="team" label="Tabela de membros + papéis" width={APP_W} height={APP_H}>
              <Frame><UsersScreen /></Frame>
            </DCArtboard>
          </DCSection>

          {/* ── 08. Notificações ─────────────────────────────── */}
          <DCSection id="notifications" title="08 · Notificações"
            subtitle="Drawer flutuante (ativado pelo sino) + página completa com filtros, agrupamento por data e tipos visuais distintos.">
            <DCArtboard id="drawer" label="Drawer lateral" width={APP_W} height={APP_H}>
              <Frame><NotificationsScreen /></Frame>
            </DCArtboard>
            <DCArtboard id="notif-full" label="Página completa" width={APP_W} height={APP_H}>
              <Frame><NotificationsFullScreen /></Frame>
            </DCArtboard>
          </DCSection>

          <DCPostIt top={-30} left={60} rotate={-3} width={260}>
            Sistema unificado: stone-950 warm + âmbar (brand) + serifa DM Serif Display para momentos expressivos. Cada tela herda a linguagem da landing.
          </DCPostIt>

        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
